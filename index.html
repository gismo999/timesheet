<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Log</title>
  <!-- Using Tailwind CSS for a clean, mobile-friendly design -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen p-4">

  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
    <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Duty Log</h1>
    
    <div class="space-y-4 mb-6">
      <label class="flex items-center space-x-3 cursor-pointer">
        <input type="checkbox" id="paramedic" class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500">
        <span class="text-gray-700 font-medium">Paramedic (11:30)</span>
      </label>
      
      <label class="flex items-center space-x-3 cursor-pointer">
        <input type="checkbox" id="lunch" class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500">
        <span class="text-gray-700 font-medium">Took Lunch Break</span>
      </label>
    </div>

    <button id="logButton" onclick="submitLog()" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded hover:bg-blue-700 transition duration-200">
      Log Time & Depart
    </button>
    
    <p id="statusMessage" class="text-center mt-4 text-sm hidden font-medium"></p>
  </div>

  <script>
    // PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE
    const scriptUrl = 'https://script.google.com/macros/s/AKfycbw3OcrQVPioaKo9oO4X2oFVQ9I1eXLMrzD4O_wwVnE6NiCrXYsHbLNu6IH-vtuurqve_Q/exec';

    async function submitLog() {
      const button = document.getElementById('logButton');
      const statusText = document.getElementById('statusMessage');
      
      // Get values
      const payload = {
        paramedic: document.getElementById('paramedic').checked,
        lunch: document.getElementById('lunch').checked
      };

      // UI updates during submission
      button.disabled = true;
      button.innerText = 'Logging...';
      button.classList.replace('bg-blue-600', 'bg-gray-400');
      statusText.classList.add('hidden');

      try {
        // Send data to Google Apps Script
        const response = await fetch(scriptUrl, {
          method: 'POST',
          // Sending as text/plain prevents CORS preflight errors in the browser
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.success) {
          statusText.innerText = '✅ Logged successfully!';
          statusText.className = 'text-center mt-4 text-sm font-medium text-green-600';
          
          // Reset checkboxes
          document.getElementById('paramedic').checked = false;
          document.getElementById('lunch').checked = false;
        } else {
          throw new Error(result.error);
        }
      } catch (error) {
        statusText.innerText = '❌ Error logging time.';
        statusText.className = 'text-center mt-4 text-sm font-medium text-red-600';
        console.error(error);
      } finally {
        // Reset button
        button.disabled = false;
        button.innerText = 'Log Time & Depart';
        button.classList.replace('bg-gray-400', 'bg-blue-600');
      }
    }
  </script>
</body>
</html>
